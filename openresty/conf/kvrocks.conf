# Kvrocks 配置(本项目最小可用版)。
# 完整选项见 kvrocks 源码 kvrocks.conf。这里只保留测试/单机部署需要的关键项。
# (Kvrocks 2.16 移除了 loglevel/logfile/rocksdb.wal_recovery_mode 等旧键,故不写)

# 监听端口(网关通过 redis 协议连这个端口)
port 6666

# 绑定地址
bind 127.0.0.1

# 工作目录:数据库文件落盘位置(硬盘存储,这正是选 Kvrocks 的原因)
dir /home/lloyd/ZCodeProject/runtime/kvrocks-data

# 守护进程(由 run.sh 控制,这里关掉)
daemonize no

# 允许的客户端连接数
maxclients 200
