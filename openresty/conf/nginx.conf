# KV Cache 优化网关 —— OpenResty 配置
# worker 进程不要太多,本机测试够用。
worker_processes  2;
error_log  logs/error.log  warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Lua 模块搜索路径:指向本项目的 lua 目录
    lua_package_path  "/home/lloyd/ZCodeProject/openresty/lua/?.lua;;";
    lua_package_cpath "/home/lloyd/ZCodeProject/runtime/openresty/lualib/?.so;;";

    # L1 共享内存缓存(进程内 LRU,对应设计文档第 5.1 节「本地共享内存」)

    # 初始化随机种子(防雪崩抖动用)
    init_by_lua_block {
        math.randomseed(ngx.now() * 1000 + ngx.worker.pid())
    }

    upstream backend {
        # 真实推理服务;默认指向本项目的 Python 模拟后端(test harness 会动态改写)
        server 127.0.0.1:8080;
    }

    server {
        listen 8765;
        server_name _;

        # —— 运行时配置(可在 server 块里覆盖)——
        # 后端推理服务地址(被 proxy_pass 用到)
        set $kvcache_backend_url "http://backend";
        # 缓存 TTL 与抖动(秒)
        set $kvcache_ttl "21600";
        set $kvcache_jitter "600";
        # 访问驱动续期 TTL(秒,§7.4):读一次就续期,活跃链不过期
        set $kvcache_renew_ttl "1800";
        set $kvcache_max_prefix_bytes "8388608";
        set $kvcache_hash_ns "prefix_cache";
        # 缓存未命中模式:fast_fail | passthrough
        set $kvcache_miss_mode "fast_fail";
        # Kvrocks 地址
        set $kvcache_kvrocks_host "127.0.0.1";
        set $kvcache_kvrocks_port "6666";

        # 主入口:OpenAI Chat Completions
        location = /v1/chat/completions {
            access_by_lua_block {
                local gw = require "kvcache.gateway"
                gw.access_phase()
            }
            proxy_pass $kvcache_backend_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # 确保自定义 X- Header 默认透传(中间件一般会保留)
            proxy_pass_request_headers on;

            # —— streaming / SSE 透明代理(关键)——
            proxy_http_version 1.1;           # chunked 编码需要 HTTP/1.1
            proxy_set_header Connection "";   # 清除 keep-alive,允许流式
            proxy_buffering off;              # 关闭缓冲,SSE 边收边发
            proxy_cache off;                  # 不缓存响应
            proxy_request_buffering off;      # 请求体也不缓冲(大 prompt 直传)

            header_filter_by_lua_block {
                local gw = require "kvcache.gateway"
                gw.header_filter_phase()
            }

            # log 阶段写缓存(L1 + L2/Kvrocks)—— 此阶段允许网络 IO
            log_by_lua_block {
                local gw = require "kvcache.gateway"
                gw.log_phase()
            }
        }

        # 健康检查 + 观测
        location = /__kvcache/health {
            access_log off;
            content_by_lua_block {
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"status":"ok"}')
            }
        }
    }
}
